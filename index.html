    <style>
        :root { --primary: #00f2ff; --bg: #0d0d16; --card: #161625; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-login { background: var(--primary); color: #000; }
        .btn-reg { background: #333; color: #fff; border: 1px solid var(--primary); }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .hidden { display: none; }
        .balance-card { background: #000; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px dashed var(--primary); }
        .balance-amount { font-size: 32px; color: #ffcc00; font-weight: bold; }
        .qr-area img { width: 100%; max-width: 200px; border-radius: 10px; background: white; padding: 5px; }
    </style>
</head>
